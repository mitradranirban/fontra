repos:
  - repo: https://github.com/psf/black
    rev: 25.11.0
    hooks:
      - id: black

  - repo: https://github.com/pycqa/isort
    rev: 7.0.0
    hooks:
      - id: isort
        args: ["--profile", "black"]

  - repo: https://github.com/PyCQA/flake8
    rev: 7.3.0
    hooks:
      - id: flake8

  - repo: local
    hooks:
      - id: prettier
        name: prettier
        exclude: "src/fontra/client/third-party"
        types_or: [css, javascript, json, xml, yaml, markdown, html, ts]
        entry: prettier --write --list-different --ignore-unknown
        language: node
        require_serial: false
        additional_dependencies: ["prettier@3.8.3"]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml

  - repo: local
    hooks:
      - id: run-tsc
        name: Run `tsc` to type check all TypeScript files.
        entry: npm exec tsc -- --noEmit
        language: system
        pass_filenames: false
