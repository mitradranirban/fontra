steps:
  - input: fontra-read
    source: test-py/data/mutatorsans/MutatorSans.designspace
  - filter: drop-features
  - filter: subset-glyphs
    glyphNames:
      - B
  - filter: drop-shapes
  - filter: subset-axes
    axisNames:
      - weight
  - output: fontra-write
    destination: output-subset-axes-location-base.fontra
