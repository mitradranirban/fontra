steps:
  - input: fontra-read
    source: test-py/data/workflow/input1-A.fontra
  - filter: subset-glyphs
    glyphNames:
      - A
  - filter: adjust-axes
    axes:
      weight:
        defaultValue: 400
        maxValue: 800
        minValue: 200
  - output: fontra-write
    destination: output-adjust-axes.fontra
