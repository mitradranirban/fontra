steps:
  - input: fontra-read
    source: test-py/data/workflow/input-variable-composites.fontra
  - filter: move-default-location
    newDefaultUserLocation:
      wght: 500
  - filter: trim-axes
    axes:
      wght:
        maxValue: 900
        minValue: 500
  - filter: trim-variable-glyphs
  - output: fontra-write
    destination: output-trim-variable-glyphs-3.fontra
