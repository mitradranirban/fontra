steps:
  - input: fontra-read
    source: test-py/data/workflow/input1-A.fontra
  - filter: drop-unused-sources-and-layers
  - filter: subset-axes
    axisNames:
      - weight
  - filter: drop-shapes
  - filter: amend-cmap
    cmap:
      U+0041: A
      66: null
      U+0061: null
      98: null
      4660: B
  - output: fontra-write
    destination: output-amend-cmap.fontra
