steps:
  - input: fontra-read
    source: test-py/data/workflow/input1-A.fontra
  - filter: subset-glyphs
    glyphNames:
      - A
  - filter: rename-axes
    axes:
      weight:
        label: Thickness
        name: Thickness
        tag: THCK
  - output: fontra-write
    destination: output-rename-axes.fontra
