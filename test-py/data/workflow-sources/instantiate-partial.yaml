steps:
  - input: fontra-read
    source: test-common/fonts/MutatorSans.fontra
  - filter: subset-glyphs
    glyphNames:
      - A
      - B
  - filter: subset-axes
    axisNames:
      - weight
      - width
  - filter: instantiate
    location:
      width: 400
  - filter: round-coordinates
  - output: fontra-write
    destination: output-instantiate-partial.fontra
