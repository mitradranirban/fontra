steps:
  - input: fontra-read
    source: test-py/data/workflow/input-trim-axes.fontra
  - filter: trim-axes
    axes:
      weight:
        maxValue: 800
        minValue: 200
      width:
        maxValue: 700
        minValue: 100
  - output: fontra-write
    destination: output-trim-axes.fontra
