steps:
  - input: fontra-read
    source: test-py/data/workflow/input1-A.fontra
  - filter: drop-unused-sources-and-layers
  - filter: subset-axes
    axisNames:
      - weight
  - filter: drop-shapes
  - filter: amend-cmap
    cmapFile: test-py/data/workflow/amend-cmap-cmap.txt
  - output: fontra-write
    destination: output-amend-cmap.fontra
